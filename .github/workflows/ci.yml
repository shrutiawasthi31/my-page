name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop, feature/* ]
  pull_request:
    branches: [ main, develop ]

jobs:
  validate:
    runs-on: ubuntu-latest
    name: Code Validation

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Run linting
        run: npm run lint || echo "No linting script defined"

      - name: Run tests
        run: npm test || echo "No tests configured"

      - name: Build project
        run: npm run build || echo "No build script defined"

  accessibility:
    runs-on: ubuntu-latest
    name: Accessibility Check

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Run accessibility tests
        run: |
          echo "Running accessibility checks..."
          # Add accessibility testing tools here
          # Example: axe, pa11y, or similar

  deploy:
    needs: [validate, accessibility]
    runs-on: ubuntu-latest
    name: Deploy to GitHub Pages
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')

    permissions:
      contents: read
      pages: write
      id-token: write

    concurrency:
      group: "pages"
      cancel-in-progress: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Pages
        uses: actions/configure-pages@v3

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v1
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v2

      - name: Create deployment status
        run: |
          echo "✅ Deployment successful!"
          echo "🌐 Site available at: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"

  notify:
    needs: [validate, accessibility, deploy]
    runs-on: ubuntu-latest
    name: Deployment Notification
    if: always()

    steps:
      - name: Check deployment status
        run: |
          if [ "${{ needs.deploy.result }}" == "success" ]; then
            echo "✅ All checks passed and deployment successful!"
          elif [ "${{ needs.deploy.result }}" == "failure" ]; then
            echo "❌ Deployment failed!"
            exit 1
          else
            echo "⚠️ Deployment skipped (only for main or develop branches)"
          fi
